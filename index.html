<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AJRA Checkbot</title>

  <link
    rel="stylesheet"
    href="style.css"
  />
</head>
<body>

<div class="container">

  <div class="logo-wrap">

    <div class="logo">
      ⚔️
    </div>

    <h1>AJRA CHECKBOT</h1>

    <p class="sub">
      Search Username atau IGG ID
    </p>

  </div>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Masukkan Username / IGG ID"
    />

    <button id="searchBtn">
      SEARCH
    </button>

  </div>

  <div
    id="loading"
    class="loading hidden"
  >
    Searching...
  </div>

  <div id="result"></div>

</div>

<script
type="module"
src="script.js">
</script>

</body>
</html>
