<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AJRA Admin</title>

<link
rel="stylesheet"
href="admin.css">

</head>
<body>

<div class="container">

<div id="loginBox"
class="glass">

<div class="logo">
⚔️
</div>

<h1>AJRA ADMIN</h1>

<p class="sub">
Admin Login
</p>

<input
type="text"
id="username"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
LOGIN
</button>

</div>

<div id="dashboard"
class="hidden">

<div class="stats-box">

<div class="stat-card">
👥
<span id="totalUsers">
0
</span>
<p>Total User</p>
</div>

<div class="stat-card">
🟢
<span id="activeUsers">
0
</span>
<p>Aktif</p>
</div>

<div class="stat-card">
🔴
<span id="inactiveUsers">
0
</span>
<p>Nonaktif</p>
</div>

<div class="stat-card">
🎁
<span id="eventUsers">
0
</span>
<p>Menuju 1000</p>
</div>

</div>

<div class="topbar">

<h1>
⚔️ AJRA DASHBOARD
</h1>

<button id="logoutBtn"
class="logout">
Logout
</button>

</div>

<div class="glass form-card">

<input
type="text"
id="customer"
placeholder="Customer">

<input
type="text"
id="botUsername"
placeholder="Username Bot">

<input
type="text"
id="iggid"
placeholder="IGG ID">

<input
type="text"
id="server"
placeholder="Server">

<input
type="text"
id="expired"
placeholder="Expired">

<select id="status">
<option>AKTIF</option>
<option>NONAKTIF</option>
</select>

<button id="saveBtn">
Tambah Data
</button>

</div>

<h2 class="list-title">
Bot List
</h2>

<h2 class="list-title">
Reward Claims
</h2>

<div id="claimList">

</div>

<input
type="text"
id="searchBot"
placeholder="🔍 Cari username / customer / IGG ID"
class="search-admin">

<div id="botList">
</div>

<h2 class="list-title">
📦 Order Masuk
</h2>

<select id="orderFilter">

<option value="ALL">
Semua Order
</option>

<option value="PENDING">
Pending
</option>

<option value="SELESAI">
Selesai
</option>

<option value="BATAL">
Batal
</option>

</select>

<div id="orderList">
</div>

<div class="pagination">

<button id="prevPage">
← Prev
</button>

<span id="pageInfo">
Page 1
</span>

<button id="nextPage">
Next →
</button>

</div>

</div>

</div>

<script
type="module"
src="admin.js">
</script>

</body>
</html>
